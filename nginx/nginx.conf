# Production reverse proxy in front of the frontend static build and the backend API.
# Local dev uses the Vite dev server directly (docker-compose.yml); this config is for the
# production deploy target described in the blueprint's deployment architecture section.

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS in production — terminate TLS here or one layer up
    # (e.g. an ALB/Cloud Load Balancer) depending on your cloud setup.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;  # voice/STT uploads

    # Static frontend build (output of `npm run build` in frontend/)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;  # keep long-lived chat sockets alive
    }

    location /health {
        proxy_pass http://backend_upstream;
    }
}
